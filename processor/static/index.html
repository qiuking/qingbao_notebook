<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qbNoteBook 数据中心</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-card-hover: #232d42;
            --accent-cyan: #00d4ff;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d3748;
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
            --glow-purple: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景效果 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-1 {
            top: -200px;
            right: -200px;
            background: var(--accent-cyan);
        }

        .bg-glow-2 {
            bottom: -200px;
            left: -200px;
            background: var(--accent-purple);
        }

        /* 布局 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(26, 34, 53, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: var(--glow-cyan);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(139, 92, 246, 0.2));
            border-color: var(--accent-cyan);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-trend {
            font-size: 13px;
            margin-top: 8px;
            color: var(--text-muted);
        }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 图表区域 */
        .chart-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .chart-container {
            width: 100%;
            height: 350px;
        }

        .chart-container-small {
            width: 100%;
            height: 280px;
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        /* 分组列表 */
        .group-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        .group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .group-item:hover {
            border-color: var(--accent-cyan);
            background: var(--bg-card-hover);
        }

        .group-item.active {
            border-color: var(--accent-cyan);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(139, 92, 246, 0.1));
        }

        .group-name {
            font-size: 14px;
            color: var(--text-primary);
        }

        .group-count {
            font-size: 13px;
            color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
        }

        /* 文章列表 */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .article-item {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .article-item:hover {
            border-color: var(--accent-cyan);
            transform: translateX(4px);
        }

        .article-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .article-source {
            color: var(--accent-purple);
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 14px;
            color: var(--text-secondary);
            padding: 0 12px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* 日志面板 */
        .logs-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            width: 100%;
            align-items: start;
        }

        @media (max-width: 900px) {
            .logs-layout { grid-template-columns: 1fr; }
        }

        .log-source-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-source-item {
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .log-source-item:hover {
            border-color: var(--accent-cyan);
        }

        .log-source-item.active {
            border-color: var(--accent-cyan);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(139, 92, 246, 0.1));
        }

        .log-source-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .log-source-mtime {
            font-size: 11px;
            color: var(--text-muted);
        }

        .log-container {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.65;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            height: 560px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line { display: block; }

        .log-error    { color: #f87171; }
        .log-critical { color: #f87171; font-weight: bold; background: rgba(248,113,113,0.08); border-radius: 2px; }
        .log-warning  { color: #fbbf24; }
        .log-info     { color: #e2e8f0; }
        .log-debug    { color: #475569; }
        .log-cont-error    { color: #f87171; }
        .log-cont-warning  { color: #e2b060; }
        .log-cont-info     { color: #94a3b8; }
        .log-cont-debug    { color: #3d4f63; }

        .btn-refresh-on {
            color: var(--accent-green) !important;
            border-color: var(--accent-green) !important;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 24px;
        }

        .modal-body {
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .modal-body h3 {
            color: var(--accent-cyan);
            margin: 20px 0 10px;
        }

        .modal-body a {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">QB</div>
                <span class="logo-text">qbNoteBook 数据中心</span>
            </div>
            <div class="header-actions">
                <button class="btn active" onclick="switchView('dashboard')">数据概览</button>
                <button class="btn" onclick="switchView('articles')">文章列表</button>
                <button class="btn" onclick="switchView('trend')">趋势分析</button>
                <button class="btn" onclick="switchView('logs')">日志监控</button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总文章数</div>
                <div class="stat-value" id="totalArticles">-</div>
                <div class="stat-trend">数据来源: 多源聚合</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">数据源数量</div>
                <div class="stat-value" id="sourceCount">-</div>
                <div class="stat-trend">活跃数据源</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">今日新增</div>
                <div class="stat-value" id="todayNew">-</div>
                <div class="stat-trend">24小时内抓取</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本周趋势</div>
                <div class="stat-value" id="weekTrend">-</div>
                <div class="stat-trend">较上周同期</div>
            </div>
        </div>

        <div class="main-content" id="dashboardView">
            <!-- 图表区域 -->
            <div class="chart-section">
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">📈 文章发布趋势</div>
                        <div class="chart-actions">
                            <button class="btn" onclick="changeTrendDays(7)">7天</button>
                            <button class="btn active" onclick="changeTrendDays(30)">30天</button>
                            <button class="btn" onclick="changeTrendDays(90)">90天</button>
                        </div>
                    </div>
                    <div class="chart-container" id="trendChart"></div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">📊 各数据源分布</div>
                    </div>
                    <div class="chart-container-small" id="sourceChart"></div>
                </div>
            </div>

            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="sidebar-title">🔍 数据源分组</div>
                    <div class="group-list" id="groupList">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div class="sidebar-card">
                    <div class="sidebar-title">📄 最新文章</div>
                    <div class="article-list" id="latestArticles">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 文章列表视图 -->
        <div class="main-content" id="articlesView" style="display: none;">
            <div class="chart-card" style="width: 100%;">
                <div class="chart-header">
                    <div class="chart-title">📋 文章列表</div>
                    <div class="chart-actions">
                        <input type="text" id="searchInput" class="btn" placeholder="搜索标题..." style="width: 200px;">
                        <select id="sourceFilter" class="btn">
                            <option value="">全部数据源</option>
                        </select>
                    </div>
                </div>
                <div class="article-list" id="articleList" style="max-height: 600px;">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>

        <!-- 趋势分析视图 -->
        <div class="main-content" id="trendView" style="display: none;">
            <div class="chart-card" style="width: 100%;">
                <div class="chart-header">
                    <div class="chart-title">📈 趋势分析</div>
                    <div class="chart-actions">
                        <select id="trendSourceFilter" class="btn">
                            <option value="">全部数据源</option>
                        </select>
                        <button class="btn active" onclick="changeTrendDays(30)">30天</button>
                        <button class="btn" onclick="changeTrendDays(90)">90天</button>
                    </div>
                </div>
                <div class="chart-container" id="detailedTrendChart"></div>
            </div>
        </div>
    </div>

    <!-- 日志监控视图 -->
    <div id="logsView" style="display: none; flex-direction: column; gap: 20px; width: 100%;">
        <div class="logs-layout">
            <!-- 左侧：日志源列表 -->
            <div class="sidebar-card">
                <div class="sidebar-title">📋 日志源</div>
                <div class="log-source-list" id="logSourceList">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- 右侧：日志内容 -->
            <div class="chart-card" style="min-width: 0;">
                <div class="chart-header">
                    <div class="chart-title" id="logTitle">选择日志源</div>
                    <div class="chart-actions">
                        <select id="logLines" class="btn" onchange="loadLogContent()">
                            <option value="100">100 行</option>
                            <option value="200" selected>200 行</option>
                            <option value="500">500 行</option>
                        </select>
                        <button class="btn" id="autoRefreshBtn" onclick="toggleAutoRefresh()">自动刷新</button>
                        <button class="btn" onclick="loadLogContent()">↻ 刷新</button>
                    </div>
                </div>
                <div id="logStats" style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px; min-height: 16px;"></div>
                <div class="log-container" id="logContent">
                    <span class="log-debug">← 请从左侧选择日志源</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 文章详情弹窗 -->
    <div class="modal-overlay" id="articleModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle"></div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentView = 'dashboard';
        let currentPage = 1;
        let currentSource = '';
        let currentTrendDays = 30;
        let groups = [];
        let articles = [];
        let totalArticles = 0;

        // ECharts 实例
        let trendChart, sourceChart, detailedTrendChart;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadStats();
            loadGroups();
            loadLatestArticles();
            loadArticles();
            loadSourceTrend();
        });

        // 初始化图表
        function initCharts() {
            trendChart = echarts.init(document.getElementById('trendChart'));
            sourceChart = echarts.init(document.getElementById('sourceChart'));
            detailedTrendChart = echarts.init(document.getElementById('detailedTrendChart'));

            window.addEventListener('resize', () => {
                trendChart.resize();
                sourceChart.resize();
                detailedTrendChart.resize();
            });
        }

        // 加载统计信息
        async function loadStats() {
            try {
                const res = await fetch('/stats');
                const data = await res.json();

                document.getElementById('totalArticles').textContent = data.total_articles;
                document.getElementById('sourceCount').textContent = data.sources.length;

                // 今日新增
                const today = new Date().toISOString().split('T')[0];
                const trendRes = await fetch(`/api/trend/daily?days=1`);
                const trendData = await trendRes.json();
                document.getElementById('todayNew').textContent = trendData.length > 0 ? trendData[0].count : 0;

                // 本周趋势
                const weekRes = await fetch('/api/trend/daily?days=14');
                const weekData = await weekRes.json();
                if (weekData.length >= 7) {
                    const thisWeek = weekData.slice(-7).reduce((a, b) => a + b.count, 0);
                    const lastWeek = weekData.slice(-14, -7).reduce((a, b) => a + b.count, 0);
                    const diff = lastWeek > 0 ? Math.round((thisWeek - lastWeek) / lastWeek * 100) : 0;
                    const trendEl = document.getElementById('weekTrend');
                    trendEl.textContent = diff >= 0 ? `+${diff}%` : `${diff}%`;
                    trendEl.style.color = diff >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
                }
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        // 加载分组
        async function loadGroups() {
            try {
                const res = await fetch('/api/groups');
                groups = await res.json();

                const groupList = document.getElementById('groupList');
                const sourceFilter = document.getElementById('sourceFilter');
                const trendSourceFilter = document.getElementById('trendSourceFilter');

                let html = `<div class="group-item ${currentSource === '' ? 'active' : ''}" onclick="filterBySource('')">
                    <span class="group-name">全部</span>
                    <span class="group-count">${groups.reduce((a, b) => a + b.count, 0)}</span>
                </div>`;

                groups.forEach(g => {
                    html += `<div class="group-item ${currentSource === g.source_id ? 'active' : ''}" onclick="filterBySource('${g.source_id}')">
                        <span class="group-name">${g.source_name}</span>
                        <span class="group-count">${g.count}</span>
                    </div>`;

                    // 添加到筛选器
                    const option = document.createElement('option');
                    option.value = g.source_id;
                    option.textContent = g.source_name;
                    sourceFilter.appendChild(option);

                    const option2 = document.createElement('option');
                    option2.value = g.source_id;
                    option2.textContent = g.source_name;
                    trendSourceFilter.appendChild(option2);
                });

                groupList.innerHTML = html;
            } catch (e) {
                console.error('加载分组失败:', e);
                document.getElementById('groupList').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 加载最新文章
        async function loadLatestArticles() {
            try {
                const res = await fetch('/articles?page=1&page_size=10' + (currentSource ? `&source_id=${currentSource}` : ''));
                const data = await res.json();

                const container = document.getElementById('latestArticles');
                if (data.articles.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无数据</div>';
                    return;
                }

                container.innerHTML = data.articles.map(a => `
                    <div class="article-item" onclick="showArticle(${a.id})">
                        <div class="article-title">${escapeHtml(a.title)}</div>
                        <div class="article-meta">
                            <span class="article-source">${escapeHtml(a.source_name)}</span>
                            <span>${a.publish_time ? a.publish_time.split(' ')[0] : '-'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载最新文章失败:', e);
            }
        }

        // 加载文章列表
        async function loadArticles() {
            try {
                const keyword = document.getElementById('searchInput').value;
                let url = `/articles?page=${currentPage}&page_size=20`;
                if (currentSource) url += `&source_id=${currentSource}`;
                if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

                const res = await fetch(url);
                const data = await res.json();

                articles = data.articles;
                totalArticles = data.total;

                const container = document.getElementById('articleList');
                if (data.articles.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无数据</div>';
                    return;
                }

                container.innerHTML = data.articles.map(a => `
                    <div class="article-item" onclick="showArticle(${a.id})">
                        <div class="article-title">${escapeHtml(a.title)}</div>
                        <div class="article-meta">
                            <span class="article-source">${escapeHtml(a.source_name)}</span>
                            <span>${a.publish_time ? a.publish_time.split(' ')[0] : '-'}</span>
                        </div>
                    </div>
                `).join('');

                // 分页
                const totalPages = Math.ceil(data.total / data.page_size);
                const pagination = document.getElementById('pagination');
                pagination.innerHTML = `
                    <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                    <span class="page-info">${currentPage} / ${totalPages}</span>
                    <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>
                `;
            } catch (e) {
                console.error('加载文章失败:', e);
            }
        }

        // 加载趋势数据
        async function loadTrendData() {
            try {
                const url = `/api/trend/daily?days=${currentTrendDays}` + (currentSource ? `&source_id=${currentSource}` : '');
                const res = await fetch(url);
                const data = await res.json();

                const dates = data.map(d => d.date.slice(5));
                const counts = data.map(d => d.count);

                trendChart.setOption({
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(26, 34, 53, 0.9)',
                        borderColor: '#2d3748',
                        textStyle: { color: '#f1f5f9' }
                    },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: dates,
                        axisLine: { lineStyle: { color: '#2d3748' } },
                        axisLabel: { color: '#94a3b8' }
                    },
                    yAxis: {
                        type: 'value',
                        axisLine: { lineStyle: { color: '#2d3748' } },
                        axisLabel: { color: '#94a3b8' },
                        splitLine: { lineStyle: { color: '#2d3748', type: 'dashed' } }
                    },
                    series: [{
                        data: counts,
                        type: 'line',
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        lineStyle: { color: '#00d4ff', width: 3 },
                        itemStyle: { color: '#00d4ff' },
                        areaStyle: {
                            color: {
                                type: 'linear',
                                x: 0, y: 0, x2: 0, y2: 1,
                                colorStops: [
                                    { offset: 0, color: 'rgba(0, 212, 255, 0.4)' },
                                    { offset: 1, color: 'rgba(0, 212, 255, 0)' }
                                ]
                            }
                        }
                    }]
                });
            } catch (e) {
                console.error('加载趋势数据失败:', e);
            }
        }

        // 加载数据源分布
        async function loadSourceTrend() {
            try {
                const res = await fetch('/stats');
                const data = await res.json();

                const sourceData = data.sources.map(s => ({
                    name: s.source_name || s.source_id,
                    value: s.count
                }));

                const colors = ['#00d4ff', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#06b6d4', '#84cc16'];

                sourceChart.setOption({
                    tooltip: {
                        trigger: 'item',
                        backgroundColor: 'rgba(26, 34, 53, 0.9)',
                        borderColor: '#2d3748',
                        textStyle: { color: '#f1f5f9' }
                    },
                    legend: {
                        orient: 'vertical',
                        right: '5%',
                        top: 'center',
                        textStyle: { color: '#94a3b8' }
                    },
                    series: [{
                        type: 'pie',
                        radius: ['45%', '70%'],
                        center: ['35%', '50%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 8,
                            borderColor: '#1a2235',
                            borderWidth: 2
                        },
                        label: { show: false },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 14,
                                fontWeight: 'bold',
                                color: '#f1f5f9'
                            }
                        },
                        labelLine: { show: false },
                        data: sourceData.map((d, i) => ({ ...d, itemStyle: { color: colors[i % colors.length] } }))
                    }]
                });

                // 同时加载趋势图
                loadTrendData();
            } catch (e) {
                console.error('加载数据源分布失败:', e);
            }
        }

        // 切换视图
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.header-actions .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('dashboardView').style.display = view === 'dashboard' ? 'grid' : 'none';
            document.getElementById('articlesView').style.display = view === 'articles' ? 'flex' : 'none';
            document.getElementById('trendView').style.display = view === 'trend' ? 'flex' : 'none';
            document.getElementById('logsView').style.display = view === 'logs' ? 'flex' : 'none';

            if (view === 'trend') {
                setTimeout(() => detailedTrendChart.resize(), 100);
            }
            if (view === 'logs' && !logSourcesLoaded) {
                loadLogSources();
            }
            // 离开日志页时关闭自动刷新
            if (view !== 'logs' && autoRefreshEnabled) {
                toggleAutoRefresh();
            }
        }

        // 按数据源筛选
        function filterBySource(sourceId) {
            currentSource = sourceId;
            currentPage = 1;
            loadGroups();
            loadLatestArticles();
            loadArticles();
            loadTrendData();
            loadSourceTrend();
        }

        // 切换趋势天数
        function changeTrendDays(days) {
            currentTrendDays = days;
            event.target.parentElement.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadTrendData();

            if (currentView === 'trend') {
                const dates = document.getElementById('trendChart');
            }
        }

        // 翻页
        function goToPage(page) {
            currentPage = page;
            loadArticles();
        }

        // 搜索
        document.getElementById('searchInput').addEventListener('input', debounce(() => {
            currentPage = 1;
            loadArticles();
        }, 500));

        // 数据源筛选变化
        document.getElementById('sourceFilter').addEventListener('change', (e) => {
            filterBySource(e.target.value);
        });

        document.getElementById('trendSourceFilter').addEventListener('change', (e) => {
            filterBySource(e.target.value);
        });

        // 显示文章详情
        async function showArticle(id) {
            try {
                const res = await fetch(`/articles/${id}`);
                const a = await res.json();

                document.getElementById('modalTitle').textContent = a.title;
                document.getElementById('modalBody').innerHTML = `
                    <p><strong>来源：</strong>${escapeHtml(a.source_name)}</p>
                    <p><strong>作者：</strong>${escapeHtml(a.author) || '-'}</p>
                    <p><strong>发布时间：</strong>${a.publish_time || '-'}</p>
                    <p><strong>抓取时间：</strong>${a.fetch_time || '-'}</p>
                    ${a.source_url ? `<p><strong>原文链接：</strong><a href="${escapeHtml(a.source_url)}" target="_blank">${escapeHtml(a.source_url)}</a></p>` : ''}
                    <h3>摘要</h3>
                    <p>${escapeHtml(a.summary) || '-'}</p>
                    <h3>正文</h3>
                    <div style="white-space: pre-wrap;">${escapeHtml(a.content_text) || '-'}</div>
                `;

                document.getElementById('articleModal').classList.add('active');
            } catch (e) {
                console.error('加载文章详情失败:', e);
            }
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('articleModal').classList.remove('active');
        }

        // 点击遮罩关闭
        document.getElementById('articleModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        });

        // 工具函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function debounce(fn, delay) {
            let timer;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // ---------------------------------------------------------------
        // 日志监控
        // ---------------------------------------------------------------

        let currentLogId = null;
        let autoRefreshEnabled = false;
        let autoRefreshTimer = null;
        let logSourcesLoaded = false;

        async function loadLogSources() {
            try {
                const res = await fetch('/api/logs');
                const sources = await res.json();

                const container = document.getElementById('logSourceList');
                if (sources.length === 0) {
                    container.innerHTML = '<div class="empty-state">无日志文件</div>';
                    return;
                }

                container.innerHTML = sources.map(s => `
                    <div class="log-source-item ${currentLogId === s.id ? 'active' : ''}"
                         id="logSrc-${s.id}"
                         onclick="selectLogSource('${s.id}', '${escapeHtml(s.name)}')">
                        <div class="log-source-name">${escapeHtml(s.name)}</div>
                        <div class="log-source-mtime">${s.mtime}</div>
                    </div>
                `).join('');

                logSourcesLoaded = true;

                // 自动选中第一个
                if (!currentLogId && sources.length > 0) {
                    selectLogSource(sources[0].id, sources[0].name);
                }
            } catch (e) {
                console.error('加载日志源失败:', e);
                document.getElementById('logSourceList').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function selectLogSource(id, name) {
            currentLogId = id;
            document.querySelectorAll('.log-source-item').forEach(el => el.classList.remove('active'));
            const el = document.getElementById(`logSrc-${id}`);
            if (el) el.classList.add('active');
            document.getElementById('logTitle').textContent = name + ' 日志';
            loadLogContent();
        }

        async function loadLogContent() {
            if (!currentLogId) return;
            const lines = document.getElementById('logLines').value;
            try {
                const res = await fetch(`/api/logs/${currentLogId}?lines=${lines}`);
                if (!res.ok) {
                    document.getElementById('logContent').innerHTML =
                        `<span class="log-error">加载失败: HTTP ${res.status}</span>`;
                    return;
                }
                const data = await res.json();

                document.getElementById('logStats').textContent =
                    `共 ${data.total_lines} 行 · 显示最后 ${data.returned_lines} 行`;

                const container = document.getElementById('logContent');
                container.innerHTML = renderLogLines(data.lines);
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error('加载日志失败:', e);
                document.getElementById('logContent').innerHTML =
                    '<span class="log-error">网络错误，加载失败</span>';
            }
        }

        function renderLogLines(lines) {
            const levelRe = /\[(CRITICAL|ERROR|WARNING|WARN|INFO|DEBUG)\]/;
            // continuation class map: inherit a dimmer shade to distinguish
            const contClass = {
                'log-error': 'log-cont-error',
                'log-critical': 'log-cont-error',
                'log-warning': 'log-cont-warning',
                'log-info': 'log-cont-info',
                'log-debug': 'log-cont-debug',
            };
            let lastCls = 'log-info';

            return lines.map(line => {
                const m = line.match(levelRe);
                let cls;
                if (m) {
                    const lv = m[1];
                    if (lv === 'CRITICAL')              cls = 'log-critical';
                    else if (lv === 'ERROR')            cls = 'log-error';
                    else if (lv === 'WARNING' || lv === 'WARN') cls = 'log-warning';
                    else if (lv === 'INFO')             cls = 'log-info';
                    else                                cls = 'log-debug';
                    lastCls = cls;
                } else {
                    // continuation of previous log entry
                    cls = contClass[lastCls] || 'log-cont-info';
                }
                return `<span class="log-line ${cls}">${escapeHtml(line)}</span>`;
            }).join('\n');
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const btn = document.getElementById('autoRefreshBtn');
            if (autoRefreshEnabled) {
                btn.textContent = '⏹ 停止刷新';
                btn.classList.add('btn-refresh-on');
                autoRefreshTimer = setInterval(loadLogContent, 10000);
            } else {
                btn.textContent = '自动刷新';
                btn.classList.remove('btn-refresh-on');
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }
    </script>
</body>
</html>
